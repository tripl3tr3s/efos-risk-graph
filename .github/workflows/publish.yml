name: Publish

# Publishes to npm when a version tag (v*) is pushed.
# Uses OIDC Trusted Publishing: no NPM_TOKEN is stored anywhere - npm mints a
# short-lived token per run and attaches a provenance attestation.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing + provenance need npm CLI >= 11.5.1.
      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish with provenance
        run: npm publish --provenance --access public
